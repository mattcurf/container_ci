name: Scheduled Rebuild

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  rebuild:
    uses: ./.github/workflows/build-publish.yml
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
