name: Nightly Vulnerability Scan

on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 02:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: read
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/base-debian
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve image digest
        id: resolve
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            ${REGISTRY}/${IMAGE_NAME}:runtime-bookworm \
            | awk '/^Digest:[[:space:]]+/ {print $2; exit}')
          if ! echo "${DIGEST}" | grep -Eq '^sha256:[a-f0-9]{64}$'; then
            echo "Failed to resolve a valid image digest for runtime-bookworm" >&2
            exit 1
          fi
          echo "image=${REGISTRY}/${IMAGE_NAME}@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Resolved digest: ${DIGEST}"

      - name: Trivy vulnerability scan (SARIF)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.resolve.outputs.image }}
          format: sarif
          output: trivy-results-runtime.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@19b2f06db2b6f5108140aeb04014ef02b648f789 # v4.31.11
        with:
          sarif_file: trivy-results-runtime.sarif
          category: trivy-runtime

      - name: Trivy scan (table for logs)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.resolve.outputs.image }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

  scan-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve image digest
        id: resolve
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            ${REGISTRY}/${IMAGE_NAME}:dev-bookworm \
            | awk '/^Digest:[[:space:]]+/ {print $2; exit}')
          if ! echo "${DIGEST}" | grep -Eq '^sha256:[a-f0-9]{64}$'; then
            echo "Failed to resolve a valid image digest for dev-bookworm" >&2
            exit 1
          fi
          echo "image=${REGISTRY}/${IMAGE_NAME}@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Resolved digest: ${DIGEST}"

      - name: Trivy vulnerability scan (SARIF)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.resolve.outputs.image }}
          format: sarif
          output: trivy-results-dev.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@19b2f06db2b6f5108140aeb04014ef02b648f789 # v4.31.11
        with:
          sarif_file: trivy-results-dev.sarif
          category: trivy-dev

      - name: Trivy scan (table for logs)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.resolve.outputs.image }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
