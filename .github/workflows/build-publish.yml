name: Build and Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/base-debian
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=runtime-bookworm,enable={{is_default_branch}}
            type=raw,value=runtime-bookworm-{{date 'YYYYMMDD'}},enable={{is_default_branch}}
            type=sha,prefix=runtime-bookworm-

      - name: Extract Docker metadata (dev)
        id: meta-dev
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev-bookworm,enable={{is_default_branch}}
            type=raw,value=dev-bookworm-{{date 'YYYYMMDD'}},enable={{is_default_branch}}
            type=sha,prefix=dev-bookworm-

      - name: Build and push
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}

      - name: Build and push (dev)
        id: build-dev
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          target: dev
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-dev.outputs.tags }}
          labels: ${{ steps.meta-dev.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}

      - name: Set digest reference (runtime)
        id: digest-ref
        if: github.event_name != 'pull_request'
        run: |
          DIGEST=$(echo "${{ steps.build.outputs.digest }}" | head -1)
          echo "image=${REGISTRY}/${IMAGE_NAME}@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Trivy vulnerability scan - runtime (SARIF)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.digest-ref.outputs.image }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF (runtime)
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@19b2f06db2b6f5108140aeb04014ef02b648f789 # v4.31.11
        with:
          sarif_file: trivy-results.sarif
          category: trivy-runtime

      - name: Trivy scan - runtime (table for logs)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.digest-ref.outputs.image }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Trivy SBOM generation (runtime)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.digest-ref.outputs.image }}
          format: spdx-json
          output: sbom.spdx.json

      - name: Upload SBOM artifact (runtime)
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Record base image digest
        if: github.event_name != 'pull_request'
        run: |
          BASE_DIGEST=$(grep '^FROM' Dockerfile | head -1 | grep -o 'sha256:[a-f0-9]*')
          echo "Base image digest: ${BASE_DIGEST}" >> "$GITHUB_STEP_SUMMARY"
          echo "${BASE_DIGEST}" > base-digest.txt

      - name: Record package manifest
        if: github.event_name != 'pull_request'
        run: |
          docker run --rm ${{ steps.digest-ref.outputs.image }} \
            cat /app/.package-manifest > package-manifest.txt

      - name: Upload build metadata
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-metadata
          path: |
            base-digest.txt
            package-manifest.txt

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Cosign sign image (runtime)
        if: github.event_name != 'pull_request'
        run: |
          DIGEST=$(echo "${{ steps.build.outputs.digest }}" | head -1)
          cosign sign --yes \
            ${REGISTRY}/${IMAGE_NAME}@${DIGEST}

      - name: Cosign attach SBOM attestation (runtime)
        if: github.event_name != 'pull_request'
        run: |
          DIGEST=$(echo "${{ steps.build.outputs.digest }}" | head -1)
          cosign attest --yes --type spdx \
            --predicate sbom.spdx.json \
            ${REGISTRY}/${IMAGE_NAME}@${DIGEST}

      - name: Set digest reference (dev)
        id: digest-ref-dev
        if: github.event_name != 'pull_request'
        run: |
          DIGEST=$(echo "${{ steps.build-dev.outputs.digest }}" | head -1)
          echo "image=${REGISTRY}/${IMAGE_NAME}@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Trivy vulnerability scan - dev (SARIF)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.digest-ref-dev.outputs.image }}
          format: sarif
          output: trivy-results-dev.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF (dev)
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@19b2f06db2b6f5108140aeb04014ef02b648f789 # v4.31.11
        with:
          sarif_file: trivy-results-dev.sarif
          category: trivy-dev

      - name: Trivy scan - dev (table for logs)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.digest-ref-dev.outputs.image }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Trivy SBOM generation (dev)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.digest-ref-dev.outputs.image }}
          format: spdx-json
          output: sbom-dev.spdx.json

      - name: Upload SBOM artifact (dev)
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-dev
          path: sbom-dev.spdx.json

      - name: Cosign sign image (dev)
        if: github.event_name != 'pull_request'
        run: |
          DIGEST=$(echo "${{ steps.build-dev.outputs.digest }}" | head -1)
          cosign sign --yes \
            ${REGISTRY}/${IMAGE_NAME}@${DIGEST}

      - name: Cosign attach SBOM attestation (dev)
        if: github.event_name != 'pull_request'
        run: |
          DIGEST=$(echo "${{ steps.build-dev.outputs.digest }}" | head -1)
          cosign attest --yes --type spdx \
            --predicate sbom-dev.spdx.json \
            ${REGISTRY}/${IMAGE_NAME}@${DIGEST}
